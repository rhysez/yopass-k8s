apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yopass
spec:
  ingressClassName: nginx
  rules:
    - host: yopass.radioco.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yopass
                port:
                  number: 80